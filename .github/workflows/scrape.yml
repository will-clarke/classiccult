name: Scrape listings

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch: {}    # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Scrape
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}   # optional; enrichment skipped if unset
        run: python -m scraper.scrape

      - name: Commit updated listings
        run: |
          git config user.name  "listings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/screenings.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update listings ($(date -u +%Y-%m-%d))"
            git push
          fi
